<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link rel="stylesheet" href="contact.css">
</head>

<body>

<header class="header">
  <div class="pages">
    <a href="#">Home</a>
    <a href="#">Rooms</a>
    <a href="#">Pages</a>
    <a href="#">Blog</a>
    <a href="#">Contact</a>
  </div>

  <div class="logo">
    <img src="imag/logo.svg" alt="logo">
  </div>

  <div class="button">
    <button class="sign-in">Sign In</button>
    <button class="sign-up">Sign Up</button>
    <button class="book-now">Book Now</button>
  </div>
</header>

<!-- Hero section -->
<div class="main-image">
  <img src="imag/5.webp" alt="">
  <div class="text">
    <h1>Contact Us</h1>
    <p>Whether you have questions, need assistance, or simply want to share.</p>
  </div>
</div>

<!-- Contact form -->
<div class="main-main">

  <div class="main-div">
    <h1>Love to hear from you<br>Get in touch!</h1>

    <form>
      <p>Your name</p>
      <input type="text" placeholder="Your Name">

      <p>Your email</p>
      <input type="email" placeholder="Your Email">

      <p>Your message</p>
      <textarea placeholder="Your Message"></textarea>

      <button class="send">Send Message</button>
    </form>
  </div>

  <div class="web-pages">
    <img src="imag/3.webp" alt="">
  </div>

</div>

<!-- Map -->
<div class="map-addres">
  <iframe src="https://www.google.com/maps?q=31.5204,74.3587&output=embed"></iframe>

  <div class="hotel-info">
    <h2>Hotel Info</h2>
    <p>Open: Mon–Sun | Phone: +123456789</p>

    <h2>Location</h2>
    <p>Address: Sample Location</p>
  </div>
</div>

</body>
</html>
