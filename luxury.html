<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="luxury.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
  </head>
  <body>
    <div class="header-div">
      <header>
        <div class="pages">
          <a href="#">Home</a>
          <a href="#">Rooms</a>
          <a href="#">Pages</a>
          <a href="#">Blog</a>
          <a href="#">Contact</a>
        </div>
        <div class="logo">
          <img
            src="images/Moonlit - Hotel and Resturant HTML Template_files/logo.svg"
          />
        </div>
        <div class="button">
          <button class="sign-in">Sign In</button>
          <button class="sign-up">Sign Up</button>
          <button class="book-now">Book Now</button>
        </div>
      </header>
    </div>
    <section class="background-image">
      <div class="main-stay">
        <h4 class="head">Welcome to our spa</h4>
        <h1 class="stay">Luxury Stay Hotel Experience Comfort & Elegance</h1>
        <p class="para">
          Choosing Bokinn was one of the best decisions we've ever made. They
          have proven to be a reliable and innovative partner
        </p>
        <a href="#"><button class="discover">Discover room</button></a>
      </div>
    </section>
    <section class="main-input">
      <div class="check">
        <h3>Check In</h3>
        <input type="date" />
      </div>
      <div class="out">
        <h3>Check out</h3>
        <input type="date" />
      </div>
      <div class="adult">
        <h3>Adult</h3>
        <select>
          <option value="1">1 Person</option>
          <option value="2">2 Person</option>
          <option value="3">3 Person</option>
          <option value="4">4 Person</option>
          <option value="5">5 Person</option>
          <option value="6">6 Person</option>
          <option value="7">7 Person</option>
          <option value="8">8 Person</option>
          <option value="9">9 Person</option>
        </select>
      </div>
      <div class="child">
        <h3>Child</h3>
        <select>
          <option value="1">1 Child</option>
          <option value="2">2 Child</option>
          <option value="3">3 Child</option>
          <option value="4">4 Child</option>
          <option value="5">5 Child</option>
          <option value="6">6 Child</option>
          <option value="7">7 Child</option>
          <option value="8">8 Child</option>
          <option value="9">9 Child</option>
        </select>
      </div>
      <!-- <div class="now">
        <button>Check Now</button>
      </div> -->
    </section>
  </body>
</html>
